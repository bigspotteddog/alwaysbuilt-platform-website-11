name: Deploy to S3

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::482464276980:role/github-actions-deploy
          aws-region: us-east-2

      - name: Sync to S3
        run: |
          aws s3 sync ./ s3://apex-prod-482464276980-us-east-2-an/josephc/alwaysbuilt-platform-website-11/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude "README.md" \
            --exclude "screenshots/*"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1VCMZKZC0SI5B \
            --paths "/josephc/alwaysbuilt-platform-website-11/*" \
            --region us-east-1 \
            --no-cli-pager